name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create production .env
        run: |
          cat > .env << 'EOF'
          # Site Configuration
          AUTHOR_NAME=${{ secrets.AUTHOR_NAME }}
          SITE_NAME=${{ secrets.SITE_NAME }}
          SITE_URL=${{ secrets.SITE_URL }}

          # Personal Information
          PROFILE_EMAIL=${{ secrets.PROFILE_EMAIL }}
          PROFILE_LOCATION=${{ secrets.PROFILE_LOCATION }}
          PROFILE_STATUS=${{ secrets.PROFILE_STATUS }}

          # Social Media
          GITHUB_USERNAME=${{ secrets.GH_USERNAME }}
          GITHUB_URL=${{ secrets.GH_URL }}
          GITLAB_USERNAME=${{ secrets.GL_USERNAME }}
          GITLAB_URL=${{ secrets.GL_URL }}
          LINKEDIN_USERNAME=${{ secrets.LINKEDIN_USERNAME }}
          LINKEDIN_URL=${{ secrets.LINKEDIN_URL }}
          DISCORD_USERNAME=${{ secrets.DISCORD_USERNAME }}
          DISCORD_URL=${{ secrets.DISCORD_URL }}

          # Legal
          BUSINESS_NAME=${{ secrets.BUSINESS_NAME }}
          BUSINESS_ADDRESS=${{ secrets.BUSINESS_ADDRESS }}
          BUSINESS_EMAIL=${{ secrets.BUSINESS_EMAIL }}

          # CV/Resume
          CV_DOWNLOAD_PATH=${{ secrets.CV_DOWNLOAD_PATH }}

          # Domain Configuration
          PRODUCTION_DOMAIN=${{ secrets.PRODUCTION_DOMAIN }}
          CUSTOM_DOMAIN_ENABLED=${{ secrets.CUSTOM_DOMAIN_ENABLED }}
          EOF

      - name: Build site
        run: pelican content -s pelicanconf.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
